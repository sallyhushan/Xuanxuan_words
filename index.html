<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>萱萱单词闯关</title>
<style>
:root{--p:#6366f1;--p2:#4f46e5;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--bg:#f8fafc;--card:#fff;--t:#1e293b;--t2:#64748b;--b:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hidden{display:none!important}

/* Splash */
.splash{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s}
.splash.gone{opacity:0;pointer-events:none}
.splash-avatar{width:120px;height:120px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:24px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.splash h1{color:#fff;font-size:32px;margin-bottom:8px}
.splash p{color:rgba(255,255,255,.8);font-size:16px}
.splash-btn{margin-top:40px;padding:14px 48px;background:#fff;color:#764ba2;border:none;border-radius:30px;font-size:18px;font-weight:600;cursor:pointer}
.splash-btn:active{transform:scale(.95)}

/* Home */
.app{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;margin-bottom:24px}
.header h2{font-size:24px;margin-bottom:4px}
.header .subtitle{color:var(--t2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:16px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-card .num{font-size:28px;font-weight:700;color:var(--p)}
.stat-card .num.fire{color:var(--bad)}
.stat-card .label{font-size:12px;color:var(--t2);margin-top:4px}

.task-card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p),#a855f7)}
.task-card.urgent::before{background:linear-gradient(90deg,var(--bad),var(--warn))}
.task-card.done{opacity:.6}.task-card.done::before{background:var(--ok)}
.task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.task-title{font-size:18px;font-weight:600}
.task-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.task-badge.new{background:#ede9fe;color:#7c3aed}
.task-badge.urgent{background:#fef2f2;color:var(--bad)}
.task-badge.done{background:#f0fdf4;color:var(--ok)}
.task-meta{font-size:13px;color:var(--t2);margin-bottom:16px}
.task-meta span{margin-right:16px}
.task-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}

.history-section{margin-top:32px}
.history-section h3{font-size:16px;color:var(--t2);margin-bottom:12px;padding-left:4px}
.history-item{display:flex;align-items:center;background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px}
.history-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:14px}
.history-icon.g{background:#f0fdf4}.history-icon.y{background:#fffbeb}.history-icon.r{background:#fef2f2}
.history-info{flex:1}.history-title{font-size:15px;font-weight:500}.history-date{font-size:12px;color:var(--t2);margin-top:2px}
.history-score{font-size:18px;font-weight:700}.history-score.g{color:var(--ok)}.history-score.y{color:var(--warn)}.history-score.r{color:var(--bad)}

/* Game */
.game-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column}
.game-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.game-header .back{font-size:24px;cursor:pointer;padding:4px}
.game-progress{flex:1;margin:0 16px}.progress-track{height:8px;background:var(--b);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#a855f7);border-radius:4px;transition:width .4s}
.game-stats{display:flex;gap:12px;font-size:14px;font-weight:600}.game-stats .c{color:var(--ok)}.game-stats .w{color:var(--bad)}

.card-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto}
.word-card{width:100%;max-width:400px;background:var(--card);border-radius:28px;padding:36px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.08);margin-bottom:16px}
.word-display{font-size:40px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.phonetic{font-size:16px;color:var(--t2);font-style:italic;margin-bottom:20px}
.speak-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--p);background:#fff;color:var(--p);font-size:20px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.speak-btn:active{background:var(--p);color:#fff}

.timer{width:52px;height:52px;border-radius:50%;border:3px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--t2);margin:0 auto 16px;transition:all .3s}
.timer.urgent{border-color:var(--bad);color:var(--bad);animation:pu .5s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.options{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:400px}
.opt-btn{padding:16px;border:2px solid var(--b);border-radius:14px;background:#fff;font-size:16px;cursor:pointer;text-align:left;transition:all .2s}
.opt-btn:hover{border-color:var(--p)}
.opt-btn.correct{border-color:var(--ok);background:#f0fdf4;color:#166534;font-weight:700}
.opt-btn.wrong{border-color:var(--bad);background:#fef2f2;color:#991b1b}
.opt-btn.disabled{opacity:.6;pointer-events:none}

.result-strip{padding:12px;border-radius:12px;text-align:center;font-weight:600;margin-bottom:12px;width:100%;max-width:400px}
.result-strip.ok{background:#f0fdf4;color:#166534}
.result-strip.bad{background:#fef2f2;color:#991b1b}

.next-btn{width:100%;max-width:400px;padding:16px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
.next-btn:disabled{opacity:.4}

/* Result */
.result-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto}
.result-emoji{font-size:72px;margin-bottom:12px}
.result-title{font-size:26px;font-weight:700;margin-bottom:6px}
.result-subtitle{color:var(--t2);margin-bottom:28px}
.scorecard{background:var(--card);border-radius:24px;padding:28px;width:100%;max-width:380px;text-align:center;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.big-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,var(--p),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{color:var(--t2);font-size:14px;margin-top:4px}
.bd{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.bd-it .bd-n{font-size:22px;font-weight:700}.bd-it .bd-l{font-size:12px;color:var(--t2);margin-top:4px}
.bd-it.g .bd-n{color:var(--ok)}.bd-it.y .bd-n{color:var(--warn)}.bd-it.r .bd-n{color:var(--bad)}

.review-list{width:100%;max-width:380px;background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px}
.review-list h3{font-size:15px;margin-bottom:14px}
.rw{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--b)}
.rw:last-child{border:none}.rw-ic{font-size:18px;margin-right:10px;width:24px;text-align:center}
.rw-inf{flex:1}.rw-w{font-weight:600;font-size:15px}.rw-m{font-size:12px;color:var(--t2)}
.rw-tg{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
.rw-tg.m{background:#f0fdf4;color:var(--ok)}.rw-tg.s{background:#fef2f2;color:var(--bad)}.rw-tg.c{background:#fffbeb;color:var(--warn)}

.act-btns{width:100%;max-width:380px;display:flex;gap:10px}
.act-btns .btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
.act-btns .btn-sec{background:var(--bg);color:var(--t);border:1.5px solid var(--b)}
.act-btns .btn-prim{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
</style>
</head>
<body>

<!-- Splash -->
<div class="splash" id="splash"><div class="splash-avatar">👧</div><h1>萱萱单词闯关</h1><p>每天进步一点点，坚持就是胜利</p><button class="splash-btn" onclick="enter()">开始吧</button></div>

<!-- Home -->
<div class="app hidden" id="app">
<div class="header"><h2>你好，萱萱！👋</h2><p class="subtitle" id="today"></p></div>
<div class="stats-row">
<div class="stat-card"><div class="num" id="s-total">0</div><div class="label">已掌握</div></div>
<div class="stat-card"><div class="num fire" id="s-streak">0</div><div class="label">连续天数</div></div>
<div class="stat-card"><div class="num" id="s-rate">0%</div><div class="label">本周正确率</div></div>
</div>
<div id="tasks"></div>
<div class="history-section" id="h-sec"><h3>📚 闯关记录</h3><div id="h-list"></div></div>
</div>

<!-- Game -->
<div class="game-screen hidden" id="game">
<div class="game-header"><div class="back" onclick="quit()">←</div><div class="game-progress"><div class="progress-track"><div class="progress-fill" id="pg" style="width:0%"></div></div></div><div class="game-stats"><div class="c">✓ <span id="g-ok">0</span></div><div class="w">✗ <span id="g-bad">0</span></div></div></div>
<div class="card-area">
<div class="timer" id="timer">10</div>
<div class="word-card">
<button class="speak-btn" id="spk" onclick="speakNow()" title="播放发音">🔊</button>
<div class="word-display" id="wd">abandon</div>
<div class="phonetic" id="ph">/əˈbændən/</div>
</div>
<div class="result-strip hidden" id="rstrip"></div>
<div class="options" id="opts"></div>
<button class="next-btn hidden" id="nxt" onclick="nextQ()">下一题 →</button>
</div>
</div>

<!-- Result -->
<div class="result-screen hidden" id="result">
<div class="result-emoji" id="re">🎉</div><div class="result-title" id="rt">闯关完成！</div><div class="result-subtitle" id="rs">继续加油</div>
<div class="scorecard"><div class="big-score" id="bs">80%</div><div class="score-label">正确率</div><div class="bd"><div class="bd-it g"><div class="bd-n" id="b-ok">8</div><div class="bd-l">答对</div></div><div class="bd-it r"><div class="bd-n" id="b-bad">2</div><div class="bd-l">答错</div></div><div class="bd-it"><div class="bd-n" id="b-avg">3.2s</div><div class="bd-l">平均用时</div></div></div></div>
<div class="review-list"><h3>📝 本次回顾</h3><div id="rv"></div></div>
<div class="act-btns"><button class="btn btn-sec" onclick="goHome()">回到首页</button><button class="btn btn-prim" id="nxt-btn" onclick="nextRound()">下一轮 →</button></div>
</div>

<script>
// ========== DATA ==========
const BANK=[
{w:"abandon",p:"/əˈbændən/",m:"放弃，抛弃",e:"Don't abandon your dreams."},
{w:"ability",p:"/əˈbɪləti/",m:"能力，才能",e:"She has the ability to solve problems."},
{w:"absent",p:"/ˈæbsənt/",m:"缺席的，不在的",e:"He was absent from school yesterday."},
{w:"absolute",p:"/ˈæbsəluːt/",m:"绝对的，完全的",e:"I have absolute confidence in you."},
{w:"absorb",p:"/əbˈzɔːrb/",m:"吸收，吸引",e:"Sponges absorb water easily."},
{w:"abstract",p:"/ˈæbstrækt/",m:"抽象的，摘要",e:"Art can be very abstract."},
{w:"abundant",p:"/əˈbʌndənt/",m:"丰富的，大量的",e:"The region has abundant natural resources."},
{w:"academic",p:"/ˌækəˈdemɪk/",m:"学术的，理论的",e:"She has excellent academic records."},
{w:"academy",p:"/əˈkædəmi/",m:"学院，研究院",e:"He studies at a military academy."},
{w:"accelerate",p:"/əkˈseləreɪt/",m:"加速，促进",e:"The car began to accelerate."},
{w:"accent",p:"/ˈæksent/",m:"口音，重音",e:"She speaks with a British accent."},
{w:"accept",p:"/əkˈsept/",m:"接受，认可",e:"I accept your apology."},
{w:"access",p:"/ˈækses/",m:"进入，通道",e:"Students have access to the library."},
{w:"accident",p:"/ˈæksɪdənt/",m:"事故，意外",e:"There was a car accident on the highway."},
{w:"accompany",p:"/əˈkʌmpəni/",m:"陪伴，伴随",e:"She asked me to accompany her."},
{w:"accomplish",p:"/əˈkʌmplɪʃ/",m:"完成，实现",e:"We accomplished our mission."},
{w:"according",p:"/əˈkɔːrdɪŋ/",m:"根据，按照",e:"According to the weather forecast, it will rain."},
{w:"account",p:"/əˈkaʊnt/",m:"账户，解释",e:"I have a bank account."},
{w:"accumulate",p:"/əˈkjuːmjəleɪt/",m:"积累，积聚",e:"Dust accumulates on the furniture."},
{w:"accurate",p:"/ˈækjərət/",m:"准确的，精确的",e:"The watch is accurate to the second."}
];

let MEM={}, HIST=[], cur=null, G={seq:[],i:0,ok:0,bad:0,streak:0,maxStreak:0,res:[],wrongIdx:[],phase:'first',roundCount:0};
const ROUND_SIZE=20, PASS_RATE=90, TIME_LIMIT=10;

// ========== INIT ==========
function enter(){document.getElementById('splash').classList.add('gone');setTimeout(()=>{document.getElementById('splash').style.display='none';document.getElementById('app').classList.remove('hidden');init()},600)}
function init(){try{MEM=JSON.parse(localStorage.getItem('xx_mem')||'{}');HIST=JSON.parse(localStorage.getItem('xx_hist')||'[]')}catch(e){MEM={};HIST=[]}document.getElementById('today').textContent=fmt(new Date());renderHome()}
function save(){localStorage.setItem('xx_mem',JSON.stringify(MEM));localStorage.setItem('xx_hist',JSON.stringify(HIST))}

// ========== HOME ==========
function renderHome(){
const m=Object.values(MEM).filter(x=>(x.l||0)>=3).length;
document.getElementById('s-total').textContent=m;
document.getElementById('s-streak').textContent=calcStreak();
document.getElementById('s-rate').textContent=calcWeekRate()+'%';
const tc=document.getElementById('tasks');tc.innerHTML='';
const t=genTask();tc.appendChild(t);
if(HIST.length){document.getElementById('h-sec').style.display='block';renderHist()}else{document.getElementById('h-sec').style.display='none'}
}
function genTask(){
const pool=[...BANK].sort(()=>Math.random()-.5).slice(0,ROUND_SIZE);
const ids=pool.map(x=>x.w);
return mkCard({title:'今日单词闯关',sub:`共 ${ROUND_SIZE} 个单词`,words:ids,mode:'mixed',due:'今日',new:true});
}
function mkCard(tk){
const d=document.createElement('div');d.className='task-card'+(tk.new?'':' urgent');
d.innerHTML=`<div class="task-header"><div class="task-title">${tk.title}</div><div class="task-badge ${tk.new?'new':'urgent'}">${tk.new?'新任务':'待复习'}</div></div><div class="task-meta"><span>📋 ${tk.words.length} 个单词</span><span>⏰ ${tk.due}</span></div><button class="task-btn" onclick="startG()">开始闯关</button>`;
return d;
}
function renderHist(){
const c=document.getElementById('h-list');c.innerHTML='';
HIST.slice(-5).reverse().forEach(h=>{
const sc=h.acc>=80?'g':h.acc>=60?'y':'r';
const ic=h.acc>=80?'🌟':h.acc>=60?'👍':'💪';
const d=document.createElement('div');d.className='history-item';
d.innerHTML=`<div class="history-icon ${sc}">${ic}</div><div class="history-info"><div class="history-title">${h.t}</div><div class="history-date">${h.d} · ${h.ok}/${h.tot} 正确</div></div><div class="history-score ${sc}">${h.acc}%</div>`;
c.appendChild(d);
});
}

// ========== GAME ==========
function startG(){
cur=genTask();G.seq=[...BANK].sort(()=>Math.random()-.5).slice(0,ROUND_SIZE).map((w,idx)=>({...w,_idx:idx,retest:false}));
G.i=0;G.ok=0;G.bad=0;G.streak=0;G.maxStreak=0;G.res=[];G.wrongIdx=[];G.phase='first';G.roundCount=1;
document.getElementById('app').classList.add('hidden');document.getElementById('game').classList.remove('hidden');renderQ();
}
function renderQ(){
if(G.i>=G.seq.length){
if(G.phase==='first'&&G.wrongIdx.length>0){G.phase='retest';G.wrongIdx.forEach(idx=>G.seq.push({...G.seq[idx],retest:true}));}
else if(G.phase==='retest'&&G.wrongIdx.length>0){G.phase='retry';G.wrongIdx=[];G.seq.forEach(x=>{if(!x.retest||!G.res.find(r=>r.w===x.w&&r.ok))G.wrongIdx.push(x._idx);});} // 简化：retest后仍错的
else{finish();return}
G.i=G.seq.length-G.wrongIdx.length; // 跳到追加题
}
const q=G.seq[G.i];if(!q){finish();return}
document.getElementById('pg').style.width=(G.i/G.seq.length*100)+'%';
document.getElementById('g-ok').textContent=G.ok;document.getElementById('g-bad').textContent=G.bad;
document.getElementById('wd').textContent=q.w;document.getElementById('ph').textContent=q.p;
document.getElementById('rstrip').classList.add('hidden');document.getElementById('nxt').classList.add('hidden');
const opts=genOpts(q);renderOpts(opts,q);
document.getElementById('timer').textContent=TIME_LIMIT;document.getElementById('timer').className='timer';
startT();speak(q.w);
}
function genOpts(correct){
const wrong=BANK.filter(x=>x.w!==correct.w).sort(()=>Math.random()-.5).slice(0,5);
const all=[correct,...wrong].sort(()=>Math.random()-.5);
return all.map(o=>({w:o.w,m:o.m,ok:o.w===correct.w}));
}
function renderOpts(opts,correct){
const c=document.getElementById('opts');c.innerHTML='';
opts.forEach((o,idx)=>{
const b=document.createElement('button');b.className='opt-btn';b.textContent=String.fromCharCode(65+idx)+'. '+o.m;b.dataset.ok=o.ok;
b.onclick=()=>pick(o.ok,b,opts,correct);
c.appendChild(b);
});
}
let tmr=null,tLeft=TIME_LIMIT;
function startT(){clearInterval(tmr);tLeft=TIME_LIMIT;tmr=setInterval(()=>{tLeft-=.1;const el=document.getElementById('timer');el.textContent=Math.max(0,Math.ceil(tLeft));if(tLeft<=3)el.className='timer urgent';if(tLeft<=0){clearInterval(tmr);timeout();}},100)}
function timeout(){const btns=document.querySelectorAll('.opt-btn');btns.forEach(b=>b.classList.add('disabled'));showAns(false,null,true)}
function pick(isCorrect,btn,opts,correct){clearInterval(tmr);const btns=document.querySelectorAll('.opt-btn');btns.forEach(b=>{b.classList.add('disabled');if(b.dataset.ok==='true')b.classList.add('correct');});if(!isCorrect){btn.classList.add('wrong');}showAns(isCorrect,btn,false)}
function showAns(ok,btn,wasTimeout){
const q=G.seq[G.i];const t=(TIME_LIMIT-Math.max(0,tLeft)).toFixed(1);
G.res.push({w:q.w,ok:ok,time:parseFloat(t),retest:q.retest});
if(ok){G.ok++;G.streak++;if(G.streak>G.maxStreak)G.maxStreak=G.streak;document.getElementById('rstrip').textContent=G.streak>=3?`🔥 连续 ${G.streak} 题正确！`:'✅ 正确！';document.getElementById('rstrip').className='result-strip ok';}
else{G.bad++;G.streak=0;if(!q.retest)G.wrongIdx.push(G.i);document.getElementById('rstrip').textContent=wasTimeout?'⏰ 时间到！':'❌ 再想想看';document.getElementById('rstrip').className='result-strip bad';}
document.getElementById('rstrip').classList.remove('hidden');document.getElementById('nxt').classList.remove('hidden');
}
function nextQ(){G.i++;renderQ();}
function speak(w){if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}}
function speakNow(){const w=G.seq[G.i]?.w;if(w)speak(w)}

// ========== FINISH ==========
function finish(){
const total=G.res.filter(r=>!r.retest).length;const correct=G.res.filter(r=>!r.retest&&r.ok).length;
const acc=total>0?Math.round(correct/total*100):0;
const times=G.res.filter(r=>!r.retest).map(r=>r.time);
const avg=times.length?(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1):'0.0';
const rec={t:`第${G.roundCount}轮闯关`,d:fmt(new Date()),tot:total,ok:correct,bad:total-correct,acc:acc,avg:avg,max:G.maxStreak,words:G.res};
HIST.push(rec);save();updateMem();
document.getElementById('game').classList.add('hidden');document.getElementById('result').classList.remove('hidden');
document.getElementById('bs').textContent=acc+'%';document.getElementById('b-ok').textContent=correct;document.getElementById('b-bad').textContent=total-correct;document.getElementById('b-avg').textContent=avg+'s';
let em,tit,sub;if(acc>=PASS_RATE){em='🏆';tit='闯关成功！';sub=`正确率 ${acc}% · 解锁下一轮！`;document.getElementById('nxt-btn').textContent='下一轮 →';document.getElementById('nxt-btn').style.display='block';}
else{em='💪';tit='继续加油！';sub=`正确率 ${acc}% · 再来一次巩固一下`;document.getElementById('nxt-btn').textContent='再来一次';document.getElementById('nxt-btn').style.display='block';}
if(acc>=95){em='🌟';tit='太棒了！';sub='几乎全对！继续挑战下一轮吧！'}
document.getElementById('re').textContent=em;document.getElementById('rt').textContent=tit;document.getElementById('rs').textContent=sub;
const rv=document.getElementById('rv');rv.innerHTML='';
G.res.filter(r=>!r.retest).forEach(r=>{
const w=BANK.find(x=>x.w===r.w);
const d=document.createElement('div');d.className='rw';
const tg=r.ok?'<span class="rw-tg m">已掌握</span>':'<span class="rw-tg s">待加强</span>';
d.innerHTML=`<div class="rw-ic">${r.ok?'✅':'❌'}</div><div class="rw-inf"><div class="rw-w">${r.w} <span style="color:var(--t2);font-size:12px">${w?.p||''}</span></div><div class="rw-m">${w?.m||''}</div></div>${tg}`;
rv.appendChild(d);
});
}
function nextRound(){
const last=HIST[HIST.length-1];if(last&&last.acc>=PASS_RATE){G.roundCount++;G.seq=[...BANK].sort(()=>Math.random()-.5).slice(0,ROUND_SIZE).map((w,idx)=>({...w,_idx:idx,retest:false}));}
else{G.seq=[...BANK].sort(()=>Math.random()-.5).slice(0,ROUND_SIZE).map((w,idx)=>({...w,_idx:idx,retest:false}));}
G.i=0;G.ok=0;G.bad=0;G.streak=0;G.maxStreak=0;G.res=[];G.wrongIdx=[];G.phase='first';
document.getElementById('result').classList.add('hidden');document.getElementById('game').classList.remove('hidden');renderQ();
}
function goHome(){document.getElementById('result').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderHome();}
function quit(){if(confirm('确定退出？进度将不会保存。')){clearInterval(tmr);document.getElementById('game').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderHome();}}

// ========== MEMORY ==========
function updateMem(){
G.res.filter(r=>!r.retest).forEach(r=>{
if(!MEM[r.w])MEM[r.w]={l:0,seen:0,ok:0,streak:0,hist:[]};
const m=MEM[r.w];m.seen++;m.hist.push({d:new Date().toISOString(),ok:r.ok});
if(r.ok){m.ok++;m.streak++;if(m.streak>=3)m.l=Math.min(5,m.l+2);else m.l=Math.min(5,m.l+1);}
else{m.streak=0;m.l=Math.max(0,m.l-1);}
});
save();
}

// ========== UTILS ==========
function fmt(d){return `${d.getMonth()+1}月${d.getDate()}日 周${['日','一','二','三','四','五','六'][d.getDay()]}`;}
function calcStreak(){if(!HIST.length)return 0;return new Set(HIST.map(h=>h.d)).size;}
function calcWeekRate(){const wk=new Date();wk.setDate(wk.getDate()-7);const rec=HIST.filter(h=>new Date(h.d)>=wk);if(!rec.length)return 0;const t=rec.reduce((s,h)=>s+h.tot,0),o=rec.reduce((s,h)=>s+h.ok,0);return t?Math.round(o/t*100):0;}
