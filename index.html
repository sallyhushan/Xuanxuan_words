<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>萱萱单词闯关</title>
<style>
:root{--p:#6366f1;--p2:#4f46e5;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--bg:#f8fafc;--card:#fff;--t:#1e293b;--t2:#64748b;--b:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hidden{display:none!important}

.splash{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s}
.splash.gone{opacity:0;pointer-events:none}
.splash-avatar{width:120px;height:120px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:24px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.splash h1{color:#fff;font-size:32px;margin-bottom:8px}
.splash p{color:rgba(255,255,255,.8);font-size:16px}
.splash-btn{margin-top:40px;padding:14px 48px;background:#fff;color:#764ba2;border:none;border-radius:30px;font-size:18px;font-weight:600;cursor:pointer}
.splash-btn:active{transform:scale(.95)}

.app{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;margin-bottom:24px}
.header h2{font-size:24px;margin-bottom:4px}
.header .subtitle{color:var(--t2);font-size:14px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:16px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-card .num{font-size:28px;font-weight:700;color:var(--p)}
.stat-card .num.fire{color:var(--bad)}
.stat-card .label{font-size:12px;color:var(--t2);margin-top:4px}

.task-card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p),#a855f7)}
.task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.task-title{font-size:18px;font-weight:600}
.task-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#ede9fe;color:#7c3aed}
.task-meta{font-size:13px;color:var(--t2);margin-bottom:16px}
.task-meta span{margin-right:16px}
.task-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}

.history-section{margin-top:32px}
.history-section h3{font-size:16px;color:var(--t2);margin-bottom:12px;padding-left:4px}
.history-item{display:flex;align-items:center;background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px}
.history-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:14px}
.history-icon.g{background:#f0fdf4}.history-icon.y{background:#fffbeb}.history-icon.r{background:#fef2f2}
.history-info{flex:1}.history-title{font-size:15px;font-weight:500}.history-date{font-size:12px;color:var(--t2);margin-top:2px}
.history-score{font-size:18px;font-weight:700}.history-score.g{color:var(--ok)}.history-score.y{color:var(--warn)}.history-score.r{color:var(--bad)}

.game-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column}
.game-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.game-header .back{font-size:24px;cursor:pointer;padding:4px}
.game-progress{flex:1;margin:0 16px}.progress-track{height:8px;background:var(--b);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#a855f7);border-radius:4px;transition:width .4s}
.game-stats{display:flex;gap:12px;font-size:14px;font-weight:600}.game-stats .c{color:var(--ok)}.game-stats .w{color:var(--bad)}

.card-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto}
.word-card{width:100%;max-width:400px;background:var(--card);border-radius:28px;padding:36px 24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.08);margin-bottom:16px;position:relative}
.word-display{font-size:40px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.phonetic{font-size:14px;color:var(--t2);margin-bottom:12px}

.retest-tag{position:absolute;top:12px;right:12px;padding:4px 12px;background:#fef2f2;color:var(--bad);border-radius:12px;font-size:12px;font-weight:600}
.hint-used-tag{position:absolute;top:12px;left:12px;padding:4px 12px;background:#fffbeb;color:var(--warn);border-radius:12px;font-size:12px;font-weight:600}

.timer{width:52px;height:52px;border-radius:50%;border:3px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--t2);margin:0 auto 16px;transition:all .3s}
.timer.urgent{border-color:var(--bad);color:var(--bad);animation:pu .5s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.options{display:grid;grid-template-columns:1fr;gap:10px;width:100%;max-width:400px}
.opt-btn{padding:16px;border:2px solid var(--b);border-radius:14px;background:#fff;font-size:16px;cursor:pointer;text-align:left;transition:all .2s}
.opt-btn:hover{border-color:var(--p)}
.opt-btn.correct{border-color:var(--ok);background:#f0fdf4;color:#166534;font-weight:700}
.opt-btn.wrong{border-color:var(--bad);background:#fef2f2;color:#991b1b}
.opt-btn.disabled{opacity:.6;pointer-events:none}

.result-strip{padding:12px;border-radius:12px;text-align:center;font-weight:600;margin-bottom:12px;width:100%;max-width:400px}
.result-strip.ok{background:#f0fdf4;color:#166534}
.result-strip.bad{background:#fef2f2;color:#991b1b}
.result-strip.info{background:#eff6ff;color:#1e40af}

.hint-box{width:100%;max-width:400px;background:#f8fafc;border-radius:14px;padding:16px;margin-bottom:12px;border-left:3px solid var(--warn)}
.hint-box .hint-pos{font-size:14px;color:var(--t2);margin-bottom:8px}
.hint-box .hint-ex{font-size:15px;color:var(--t);line-height:1.6}
.hint-box .hint-ex b{color:var(--p)}

.speak-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--p);background:#fff;color:var(--p);font-size:20px;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.speak-btn:active{background:var(--p);color:#fff}

.hint-btn{width:100%;max-width:400px;padding:12px;background:var(--bg);color:var(--t2);border:1.5px solid var(--b);border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px}
.hint-btn:disabled{opacity:.5;cursor:not-allowed}

.related-box{width:100%;max-width:400px;background:#f0fdf4;border-radius:14px;padding:16px;margin-top:12px;border-left:3px solid var(--ok)}
.related-box .rel-title{font-size:13px;color:var(--ok);font-weight:600;margin-bottom:8px}
.related-box .rel-item{font-size:14px;color:var(--t);margin-bottom:4px}
.related-box .rel-note{font-size:12px;color:var(--t2);margin-top:6px}

.result-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto}
.result-emoji{font-size:72px;margin-bottom:12px}
.result-title{font-size:26px;font-weight:700;margin-bottom:6px}
.result-subtitle{color:var(--t2);margin-bottom:28px}
.scorecard{background:var(--card);border-radius:24px;padding:28px;width:100%;max-width:380px;text-align:center;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.big-score{font-size:52px;font-weight:800;background:linear-gradient(135deg,var(--p),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{color:var(--t2);font-size:14px;margin-top:4px}
.bd{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.bd-it .bd-n{font-size:22px;font-weight:700}.bd-it .bd-l{font-size:12px;color:var(--t2);margin-top:4px}
.bd-it.g .bd-n{color:var(--ok)}.bd-it.y .bd-n{color:var(--warn)}.bd-it.r .bd-n{color:var(--bad)}

.review-list{width:100%;max-width:380px;background:var(--card);border-radius:20px;padding:20px;margin-bottom:16px}
.review-list h3{font-size:15px;margin-bottom:14px}
.rw{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--b)}
.rw:last-child{border:none}.rw-ic{font-size:18px;margin-right:10px;width:24px;text-align:center}
.rw-inf{flex:1}.rw-w{font-weight:600;font-size:15px}.rw-m{font-size:12px;color:var(--t2)}
.rw-tg{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-left:6px}
.rw-tg.m{background:#f0fdf4;color:var(--ok)}.rw-tg.s{background:#fef2f2;color:var(--bad)}.rw-tg.c{background:#fffbeb;color:var(--warn)}

.act-btns{width:100%;max-width:380px;display:flex;gap:10px}
.act-btns .btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
.act-btns .btn-sec{background:var(--bg);color:var(--t);border:1.5px solid var(--b)}
.act-btns .btn-prim{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}
</style>
</head>
<body>

<div class="splash" id="splash"><div class="splash-avatar">👧</div><h1>萱萱单词闯关</h1><p>每天进步一点点，坚持就是胜利</p><button class="splash-btn" onclick="enter()">开始吧</button></div>

<div class="app hidden" id="app">
<div class="header"><h2>你好，萱萱！👋</h2><p class="subtitle" id="today"></p></div>
<div class="stats-row">
<div class="stat-card"><div class="num" id="s-total">0</div><div class="label">已掌握</div></div>
<div class="stat-card"><div class="num fire" id="s-streak">0</div><div class="label">连续天数</div></div>
<div class="stat-card"><div class="num" id="s-rate">0%</div><div class="label">本周正确率</div></div>
</div>
<div id="tasks"></div>
<div class="history-section" id="h-sec"><h3>📚 闯关记录</h3><div id="h-list"></div></div>
</div>

<div class="game-screen hidden" id="game">
<div class="game-header"><div class="back" onclick="quit()">←</div><div class="game-progress"><div class="progress-track"><div class="progress-fill" id="pg" style="width:0%"></div></div></div><div class="game-stats"><div class="c">✓ <span id="g-ok">0</span></div><div class="w">✗ <span id="g-bad">0</span></div></div></div>
<div class="card-area">
<div class="timer" id="timer">10</div>
<div class="word-card">
<div class="retest-tag hidden" id="rtag">错题重练</div>
<div class="hint-used-tag hidden" id="htag">已用提示</div>
<button class="speak-btn" id="spk" onclick="speakNow()" title="播放发音">🔊</button>
<div class="word-display" id="wd">word</div>
<div class="phonetic" id="ph">pos</div>
</div>
<button class="hint-btn" id="hintBtn" onclick="showHint()">💡 需要提示？</button>
<div class="hint-box hidden" id="hintBox">
<div class="hint-pos" id="hintPos"></div>
<div class="hint-ex" id="hintEx"></div>
</div>
<div class="result-strip hidden" id="rstrip"></div>
<div class="options" id="opts"></div>
<div class="related-box hidden" id="relBox">
<div class="rel-title">📝 关联记忆</div>
<div id="relContent"></div>
</div>
</div>
</div>

<div class="result-screen hidden" id="result">
<div class="result-emoji" id="re">🎉</div><div class="result-title" id="rt">闯关完成！</div><div class="result-subtitle" id="rs">继续加油</div>
<div class="scorecard"><div class="big-score" id="bs">80%</div><div class="score-label">正确率</div><div class="bd"><div class="bd-it g"><div class="bd-n" id="b-ok">8</div><div class="bd-l">答对</div></div><div class="bd-it r"><div class="bd-n" id="b-bad">2</div><div class="bd-l">答错</div></div><div class="bd-it"><div class="bd-n" id="b-avg">3.2s</div><div class="bd-l">平均用时</div></div></div></div>
<div class="review-list"><h3>📝 本次回顾</h3><div id="rv"></div></div>
<div class="act-btns"><button class="btn btn-sec" onclick="goHome()">回到首页</button><button class="btn btn-prim" id="nxt-btn" onclick="nextRound()">下一轮 →</button></div>
</div>

let MEM={},HIST=[],G={seq:[],retestSeq:[],i:0,ok:0,bad:0,streak:0,maxStreak:0,res:[],phase:'first',wrongSet:new Set(),roundCount:0,usedHint:false};
const ROUND_SIZE=20,PASS_RATE=90,TIME_LIMIT=10;

function enter(){
  // Unlock audio on mobile - use a silent utterance
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance('.');u.volume=0.01;u.lang='en-US';
    window.speechSynthesis.speak(u);
    if(window.speechSynthesis.getVoices().length===0){
      window.speechSynthesis.onvoiceschanged=function(){
        window.speechSynthesis.getVoices();
      };
    }
  }
  document.getElementById('splash').classList.add('gone');
  setTimeout(function(){
    document.getElementById('splash').style.display='none';
    document.getElementById('app').classList.remove('hidden');
    init();
  },600);
}

function init(){try{MEM=JSON.parse(localStorage.getItem('xx_mem')||'{}');HIST=JSON.parse(localStorage.getItem('xx_hist')||'[]')}catch(e){MEM={};HIST=[]}document.getElementById('today').textContent=fmt(new Date());renderHome()}
function save(){localStorage.setItem('xx_mem',JSON.stringify(MEM));localStorage.setItem('xx_hist',JSON.stringify(HIST))}

// HOME
function renderHome(){
  var m=Object.values(MEM).filter(function(x){return(x.l||0)>=3}).length;
  document.getElementById('s-total').textContent=m;
  document.getElementById('s-streak').textContent=calcStreak();
  document.getElementById('s-rate').textContent=calcWeekRate()+'%';
  var tc=document.getElementById('tasks');tc.innerHTML='';
  var t=genTask();tc.appendChild(t);
  if(HIST.length){document.getElementById('h-sec').style.display='block';renderHist()}else{document.getElementById('h-sec').style.display='none'}
}
function genTask(){
  var pool=BANK.slice().sort(function(){return Math.random()-.5}).slice(0,ROUND_SIZE);
  var ids=pool.map(function(x){return x.w});
  return mkCard({title:'今日单词闯关',sub:'共 '+ROUND_SIZE+' 个单词',words:ids,mode:'mixed',due:'今日',new:true});
}
function mkCard(tk){
  var d=document.createElement('div');d.className='task-card';
  d.innerHTML='<div class="task-header"><div class="task-title">'+tk.title+'</div><div class="task-badge">新任务</div></div><div class="task-meta"><span>📋 '+tk.words.length+' 个单词</span><span>⏰ '+tk.due+'</span></div><button class="task-btn" onclick="startG()">开始闯关</button>';
  return d;
}
function renderHist(){
  var c=document.getElementById('h-list');c.innerHTML='';
  HIST.slice(-5).reverse().forEach(function(h){
    var sc=h.acc>=80?'g':h.acc>=60?'y':'r';
    var ic=h.acc>=80?'🌟':h.acc>=60?'👍':'💪';
    var d=document.createElement('div');d.className='history-item';
    d.innerHTML='<div class="history-icon '+sc+'">'+ic+'</div><div class="history-info"><div class="history-title">'+h.t+'</div><div class="history-date">'+h.d+' · '+h.ok+'/'+h.tot+' 正确</div></div><div class="history-score '+sc+'">'+h.acc+'%';
    c.appendChild(d);
  });
}

// GAME
function startG(){
  G.seq=BANK.slice().sort(function(){return Math.random()-.5}).slice(0,ROUND_SIZE);
  G.retestSeq=[];G.i=0;G.ok=0;G.bad=0;G.streak=0;G.maxStreak=0;G.res=[];
  G.phase='first';G.wrongSet=new Set();G.roundCount++;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderQ();
}

function renderQ(){
  var q;
  G.usedHint=false;
  document.getElementById('htag').classList.add('hidden');
  document.getElementById('hintBtn').disabled=false;
  document.getElementById('hintBox').classList.add('hidden');
  document.getElementById('relBox').classList.add('hidden');
  if(G.phase==='first'){
    if(G.i>=G.seq.length){
      if(G.wrongSet.size>0){
        G.phase='retest';G.i=0;
        G.retestSeq=[];
        G.wrongSet.forEach(function(w){
          var found=BANK.find(function(x){return x.w===w});
          if(found) G.retestSeq.push(found);
        });
        showRetestBanner();return;
      }else{finish();return}
    }
    q=G.seq[G.i];
    document.getElementById('rtag').classList.add('hidden');
    document.getElementById('pg').style.width=(G.i/G.seq.length*100)+'%';
  }else if(G.phase==='retest'){
    if(G.i>=G.retestSeq.length){finish();return}
    q=G.retestSeq[G.i];
    document.getElementById('rtag').classList.remove('hidden');
    document.getElementById('pg').style.width=(G.i/G.retestSeq.length*100)+'%';
  }
  if(!q){finish();return}

  document.getElementById('g-ok').textContent=G.ok;
  document.getElementById('g-bad').textContent=G.bad;
  document.getElementById('wd').textContent=q.w;
  document.getElementById('ph').textContent=q.p;
  document.getElementById('rstrip').classList.add('hidden');
  var opts=genOpts(q);
  renderOpts(opts,q);
  document.getElementById('timer').textContent=TIME_LIMIT;
  document.getElementById('timer').className='timer';
  startT();
  setTimeout(function(){speak(q.w);},300);
}

function showRetestBanner(){
  document.getElementById('rstrip').textContent='📚 接下来是错题重练 · 共 '+G.wrongSet.size+' 题';
  document.getElementById('rstrip').className='result-strip info';
  document.getElementById('rstrip').classList.remove('hidden');
  document.getElementById('opts').innerHTML='';
  document.getElementById('hintBtn').classList.add('hidden');
  setTimeout(function(){
    document.getElementById('rstrip').classList.add('hidden');
    document.getElementById('hintBtn').classList.remove('hidden');
    renderQ();
  },2000);
}

function genOpts(correct){
  var wrong=BANK.filter(function(x){return x.w!==correct.w}).slice().sort(function(){return Math.random()-.5}).slice(0,5);
  var all=[correct].concat(wrong).slice().sort(function(){return Math.random()-.5});
  return all.map(function(o){return{w:o.w,m:o.m,ok:o.w===correct.w}});
}
function renderOpts(opts,correct){
  var c=document.getElementById('opts');c.innerHTML='';
  opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt-btn';b.textContent=String.fromCharCode(65+idx)+'. '+o.m;b.dataset.ok=o.ok?'true':'false';
    b.onclick=function(){pick(o.ok,b,opts,correct)};
    c.appendChild(b);
  });
}

var tmr=null,tLeft=TIME_LIMIT;
function startT(){clearInterval(tmr);tLeft=TIME_LIMIT;tmr=setInterval(function(){
  tLeft-=.1;var el=document.getElementById('timer');el.textContent=Math.max(0,Math.ceil(tLeft));
  if(tLeft<=3)el.className='timer urgent';
  if(tLeft<=0){clearInterval(tmr);timeout();}
},100)}
function timeout(){document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled')});showAns(false,null,true)}

function showHint(){
  clearInterval(tmr);
  G.usedHint=true;
  document.getElementById('htag').classList.remove('hidden');
  document.getElementById('hintBtn').disabled=true;
  var q=G.phase==='first'?G.seq[G.i]:G.retestSeq[G.i];
  document.getElementById('hintPos').textContent='词性：'+q.p;
  document.getElementById('hintEx').innerHTML=q.e.replace(new RegExp(q.w,'gi'),'<b>'+q.w+'</b>');
  document.getElementById('hintBox').classList.remove('hidden');
}

function pick(isCorrect,btn,opts,correct){
  clearInterval(tmr);
  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.classList.add('disabled');
    if(b.dataset.ok==='true')b.classList.add('correct');
  });
  if(!isCorrect)btn.classList.add('wrong');
  showAns(isCorrect,btn,false);
}

function showAns(ok,btn,wasTimeout){
  var q=G.phase==='first'?G.seq[G.i]:G.retestSeq[G.i];
  var t=(TIME_LIMIT-Math.max(0,tLeft)).toFixed(1);

  if(G.phase==='first'){
    var statOk=ok&&!G.usedHint;
    G.res.push({w:q.w,ok:statOk,time:parseFloat(t),phase:'first',hint:G.usedHint});
    if(statOk){
      G.ok++;G.streak++;
      if(G.streak>G.maxStreak)G.maxStreak=G.streak;
      document.getElementById('rstrip').textContent=G.streak>=3?'🔥 连续 '+G.streak+' 题正确！':'✅ 正确！';
      document.getElementById('rstrip').className='result-strip ok';
    }else{
      G.bad++;G.streak=0;
      if(!G.usedHint)G.wrongSet.add(q.w);
      if(G.usedHint){
        document.getElementById('rstrip').textContent='⚠️ 用了提示，这题算答错哦';
      }else{
        document.getElementById('rstrip').textContent=wasTimeout?'⏰ 时间到！':'❌ 再想想看';
      }
      document.getElementById('rstrip').className='result-strip bad';
    }
  }else{
    if(ok){
      document.getElementById('rstrip').textContent='✅ 这次对了！';
      document.getElementById('rstrip').className='result-strip ok';
    }else{
      document.getElementById('rstrip').textContent='❌ 还需要多练习';
      document.getElementById('rstrip').className='result-strip bad';
    }
  }

  document.getElementById('rstrip').classList.remove('hidden');

  if(q.rel&&q.rel.length>0){
    var relHtml='';
    q.rel.forEach(function(r){
      relHtml+='<div class="rel-item">• <b>'+r.w+'</b>：'+r.m+'（'+r.r+'）</div>';
    });
    document.getElementById('relContent').innerHTML=relHtml+'<div class="rel-note">把它们放在一起记，印象更深刻 💡</div>';
    document.getElementById('relBox').classList.remove('hidden');
  }

  setTimeout(nextQ,2500);
}

function nextQ(){G.i++;renderQ()}

function speak(w){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=.85;u.pitch=1;
  var voices=window.speechSynthesis.getVoices();
  if(voices&&voices.length>0){
    var enVoice=voices.find(function(v){return v.lang&&v.lang.startsWith('en')});
    if(enVoice)u.voice=enVoice;
  }
  window.speechSynthesis.speak(u);
}
function speakNow(){
  var w=G.phase==='first'?(G.seq[G.i]?G.seq[G.i].w:null):(G.retestSeq[G.i]?G.retestSeq[G.i].w:null);
  if(w)speak(w);
}

// FINISH
function finish(){
  var total=G.ok+G.bad;
  var acc=total>0?Math.round(G.ok/total*100):0;
  var firstRes=G.res.filter(function(r){return r.phase==='first'});
  var times=firstRes.map(function(r){return r.time});
  var avg=times.length?(times.reduce(function(a,b){return a+b},0)/times.length).toFixed(1):'0.0';
  var rec={t:'第'+G.roundCount+'轮闯关',d:fmt(new Date()),tot:total,ok:G.ok,bad:G.bad,acc:acc,avg:avg,max:G.maxStreak,words:firstRes};
  HIST.push(rec);save();updateMem(firstRes);

  document.getElementById('game').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('bs').textContent=acc+'%';
  document.getElementById('b-ok').textContent=G.ok;
  document.getElementById('b-bad').textContent=G.bad;
  document.getElementById('b-avg').textContent=avg+'s';

  var em,tit,sub;
  if(acc>=PASS_RATE){em='🏆';tit='闯关成功！';sub='正确率 '+acc+'% · 解锁下一轮！';document.getElementById('nxt-btn').textContent='下一轮 →';}
  else{em='💪';tit='继续加油！';sub='正确率 '+acc+'% · 再来一次巩固一下';document.getElementById('nxt-btn').textContent='再来一次';}
  if(acc>=95){em='🌟';tit='太棒了！';sub='几乎全对！继续挑战下一轮吧！'}
  document.getElementById('re').textContent=em;
  document.getElementById('rt').textContent=tit;
  document.getElementById('rs').textContent=sub;

  var rv=document.getElementById('rv');rv.innerHTML='';
  firstRes.forEach(function(r){
    var w=BANK.find(function(x){return x.w===r.w});
    var d=document.createElement('div');d.className='rw';
    var tg=r.ok?'<span class="rw-tg m">已掌握</span>':'<span class="rw-tg s">待加强</span>';
    if(r.hint)tg='<span class="rw-tg c">用了提示</span>';
    d.innerHTML='<div class="rw-ic">'+(r.ok?'✅':'❌')+'</div><div class="rw-inf"><div class="rw-w">'+r.w+' <span style="color:var(--t2);font-size:12px">'+(w?w.p:'')+'</span></div><div class="rw-m">'+(w?w.m:'')+'</div></div>'+tg;
    rv.appendChild(d);
  });
}

function nextRound(){
  var last=HIST[HIST.length-1];
  if(last&&last.acc>=PASS_RATE){
    G.roundCount++;
    G.seq=BANK.slice().sort(function(){return Math.random()-.5}).slice(0,ROUND_SIZE);
  }else{
    var wrongWords=Array.from(G.wrongSet);
    var need=ROUND_SIZE-wrongWords.length;
    var newPool=BANK.filter(function(x){return !wrongWords.includes(x.w)}).slice().sort(function(){return Math.random()-.5}).slice(0,Math.max(0,need));
    G.seq=wrongWords.map(function(w){return BANK.find(function(x){return x.w===w})}).concat(newPool).filter(Boolean);
    while(G.seq.length<ROUND_SIZE){
      var extra=BANK[Math.floor(Math.random()*BANK.length)];
      if(!G.seq.find(function(x){return x.w===extra.w}))G.seq.push(extra);
    }
    G.seq=G.seq.slice(0,ROUND_SIZE);
  }
  G.retestSeq=[];G.i=0;G.ok=0;G.bad=0;G.streak=0;G.maxStreak=0;G.res=[];
  G.phase='first';G.wrongSet=new Set();
  document.getElementById('result').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderQ();
}
function goHome(){document.getElementById('result').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderHome()}
function quit(){if(confirm('确定退出？进度将不会保存。')){clearInterval(tmr);document.getElementById('game').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderHome()}}

// MEMORY
function updateMem(firstRes){
  firstRes.forEach(function(r){
    if(!MEM[r.w])MEM[r.w]={l:0,seen:0,ok:0,streak:0,hist:[]};
    var m=MEM[r.w];m.seen++;m.hist.push({d:new Date().toISOString(),ok:r.ok});
    if(r.ok){m.ok++;m.streak++;if(m.streak>=3)m.l=Math.min(5,m.l+2);else m.l=Math.min(5,m.l+1);}
    else{m.streak=0;m.l=Math.max(0,m.l-1);}
  });
  save();
}

// UTILS
function fmt(d){return (d.getMonth()+1)+'月'+d.getDate()+'日 周'+'日一二三四五六'[d.getDay()]}
function calcStreak(){if(!HIST.length)return 0;return new Set(HIST.map(function(h){return h.d})).size}
function calcWeekRate(){var wk=new Date();wk.setDate(wk.getDate()-7);var rec=HIST.filter(function(h){return new Date(h.d)>=wk});if(!rec.length)return 0;var t=rec.reduce(function(s,h){return s+h.tot},0),o=rec.reduce(function(s,h){return s+h.ok},0);return t?Math.round(o/t*100):0}
</script>
