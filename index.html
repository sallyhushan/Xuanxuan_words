<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>萱萱单词闯关</title>
<style>
:root{--p:#6366f1;--p2:#4f46e5;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444;--bg:#f8fafc;--card:#fff;--t:#1e293b;--t2:#64748b;--b:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hidden{display:none!important}

.splash{position:fixed;inset:0;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s}
.splash.gone{opacity:0;pointer-events:none}
.splash-avatar{width:120px;height:120px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:24px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.splash h1{color:#fff;font-size:32px;margin-bottom:8px}
.splash p{color:rgba(255,255,255,.8);font-size:16px}

.name-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1001}
.name-box{background:#fff;border-radius:24px;padding:32px;width:90%;max-width:360px;text-align:center}
.name-box h2{font-size:20px;margin-bottom:8px}
.name-box p{font-size:14px;color:var(--t2);margin-bottom:20px}
.name-box input{width:100%;padding:14px;border:2px solid var(--b);border-radius:14px;font-size:16px;text-align:center;margin-bottom:16px}
.name-box button{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}

.app{max-width:480px;margin:0 auto;padding:20px}
.header{text-align:center;margin-bottom:20px}
.header h2{font-size:24px;margin-bottom:4px}
.header .subtitle{color:var(--t2);font-size:14px}

.player-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:16px;padding:14px 18px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.player-bar .name{font-size:16px;font-weight:600}
.player-bar .edit{font-size:13px;color:var(--p);cursor:pointer}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:16px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-card .num{font-size:26px;font-weight:700;color:var(--p)}
.stat-card .label{font-size:12px;color:var(--t2);margin-top:4px}

.task-card{background:var(--card);border-radius:20px;padding:24px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.task-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p),#a855f7)}
.task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.task-title{font-size:18px;font-weight:600}
.task-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#ede9fe;color:#7c3aed}
.task-meta{font-size:13px;color:var(--t2);margin-bottom:16px}
.task-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
.task-btn:disabled{opacity:.5;cursor:not-allowed}

.duel-card{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border-radius:20px;padding:20px;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.08);cursor:pointer}
.duel-card.locked{background:linear-gradient(135deg,#94a3b8,#64748b);cursor:default}
.duel-card h3{font-size:18px;margin-bottom:4px}
.duel-card p{font-size:13px;opacity:.9}
.duel-card .lock-icon{font-size:24px;margin-bottom:6px}

.review-btn{width:100%;padding:12px;background:var(--card);border:1.5px solid var(--b);border-radius:14px;font-size:14px;color:var(--t2);cursor:pointer;margin-bottom:12px}

.leaderboard-btn{width:100%;padding:12px;background:var(--card);border:1.5px solid var(--b);border-radius:14px;font-size:14px;color:var(--p);font-weight:600;cursor:pointer;margin-bottom:12px}

.history-section{margin-top:24px}
.history-section h3{font-size:15px;color:var(--t2);margin-bottom:10px;padding-left:4px}
.history-item{display:flex;align-items:center;background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px}
.history-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:12px}
.history-icon.g{background:#f0fdf4}.history-icon.y{background:#fffbeb}.history-icon.r{background:#fef2f2}
.history-info{flex:1}.history-title{font-size:14px;font-weight:500}.history-date{font-size:12px;color:var(--t2);margin-top:2px}
.history-score{font-size:16px;font-weight:700}.history-score.g{color:var(--ok)}.history-score.y{color:var(--warn)}.history-score.r{color:var(--bad)}

.game-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column}
.game-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--card)}
.game-header .back{font-size:24px;cursor:pointer;padding:4px}
.game-progress{flex:1;margin:0 14px}.progress-track{height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#a855f7);border-radius:3px;transition:width .3s}
.game-stats{display:flex;gap:12px;font-size:14px;font-weight:600}.game-stats .c{color:var(--ok)}.game-stats .w{color:var(--bad)}

.card-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto}
.word-card{width:100%;max-width:400px;background:var(--card);border-radius:24px;padding:32px 20px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.08);margin-bottom:14px;position:relative}
.word-display{font-size:38px;font-weight:800;letter-spacing:1px;margin-bottom:4px}
.phonetic{font-size:15px;color:var(--p);font-weight:600;margin-bottom:6px;min-height:22px}

.timer{width:48px;height:48px;border-radius:50%;border:3px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t2);margin:0 auto 12px}
.timer.urgent{border-color:var(--bad);color:var(--bad);animation:pu .5s infinite}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.options{display:grid;grid-template-columns:1fr;gap:8px;width:100%;max-width:400px}
.opt-btn{padding:14px;border:2px solid var(--b);border-radius:12px;background:#fff;font-size:15px;cursor:pointer;text-align:left;transition:all .2s}
.opt-btn.correct{border-color:var(--ok);background:#f0fdf4;color:#166534;font-weight:700}
.opt-btn.wrong{border-color:var(--bad);background:#fef2f2;color:#991b1b}
.opt-btn.disabled{opacity:.6;pointer-events:none}

.result-strip{padding:10px 14px;border-radius:10px;text-align:center;font-weight:600;margin-bottom:10px;width:100%;max-width:400px;font-size:14px}
.result-strip.ok{background:#f0fdf4;color:#166534}
.result-strip.bad{background:#fef2f2;color:#991b1b}
.result-strip.info{background:#eff6ff;color:#1e40af}

.hint-btn{width:100%;max-width:400px;padding:10px;background:var(--bg);color:var(--t2);border:1.5px solid var(--b);border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px}
.hint-btn:disabled{opacity:.5;cursor:not-allowed}

.hint-box{width:100%;max-width:400px;background:#f8fafc;border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid var(--warn);font-size:14px}

.speak-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--p);background:#fff;color:var(--p);font-size:18px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center}

.retest-tag{position:absolute;top:10px;right:10px;padding:3px 10px;background:#fef2f2;color:var(--bad);border-radius:10px;font-size:11px;font-weight:600}

.result-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;padding:32px 20px;overflow-y:auto}
.result-emoji{font-size:60px;margin-bottom:8px}
.result-title{font-size:24px;font-weight:700;margin-bottom:4px}
.result-subtitle{color:var(--t2);font-size:14px;margin-bottom:20px}

.scorecard{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:360px;text-align:center;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.big-score{font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--p),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{color:var(--t2);font-size:13px;margin-top:4px}
.bd{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.bd-it .bd-n{font-size:20px;font-weight:700}.bd-it .bd-l{font-size:11px;color:var(--t2);margin-top:4px}
.bd-it.g .bd-n{color:var(--ok)}.bd-it.r .bd-n{color:var(--bad)}

.review-list{width:100%;max-width:360px;background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px}
.review-list h3{font-size:14px;margin-bottom:12px}
.rw{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)}
.rw:last-child{border:none}.rw-ic{font-size:16px;margin-right:8px;width:22px;text-align:center}
.rw-inf{flex:1}.rw-w{font-weight:600;font-size:14px}.rw-m{font-size:11px;color:var(--t2)}
.rw-tg{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-left:4px}
.rw-tg.m{background:#f0fdf4;color:var(--ok)}.rw-tg.s{background:#fef2f2;color:var(--bad)}

.act-btns{width:100%;max-width:360px;display:flex;gap:10px}
.act-btns .btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
.act-btns .btn-sec{background:var(--bg);color:var(--t);border:1.5px solid var(--b)}
.act-btns .btn-prim{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff}

.lb-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.lb-header{display:flex;align-items:center;margin-bottom:20px}
.lb-header .back{font-size:24px;cursor:pointer;padding:4px;margin-right:10px}
.lb-header h2{font-size:20px}
.lb-table{width:100%;max-width:460px;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.lb-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--b)}
.lb-row:last-child{border:none}
.lb-rank{width:30px;font-size:16px;font-weight:700;color:var(--t2)}
.lb-rank.top{color:var(--p)}
.lb-name{flex:1;font-size:15px;font-weight:500;padding:0 12px}
.lb-acc{font-size:15px;font-weight:700;color:var(--ok);margin-right:8px}
.lb-time{font-size:12px;color:var(--t2)}

.review-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
.review-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.review-card .r-title{font-size:15px;font-weight:600;margin-bottom:4px}
.review-card .r-meta{font-size:13px;color:var(--t2)}
.review-card .r-badge{float:right;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.review-card .r-badge.done{background:#f0fdf4;color:var(--ok)}
.review-card .r-badge.retry{background:#fffbeb;color:var(--warn)}

.duel-tag{position:absolute;top:10px;left:10px;padding:3px 10px;background:#fef2f2;color:var(--bad);border-radius:10px;font-size:11px;font-weight:600}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-avatar">👧</div>
  <h1>萱萱单词闯关</h1>
  <p>每天进步一点点，坚持就是胜利</p>
  <button class="task-btn" style="margin-top:32px;width:auto;padding:14px 48px;border-radius:30px" onclick="enter()">开始吧</button>
</div>

<!-- NAME MODAL -->
<div class="name-modal hidden" id="nameModal">
  <div class="name-box">
    <h2>🎉 欢迎来到单词闯关</h2>
    <p>告诉我你的名字，马上开始挑战！</p>
    <input type="text" id="nameInput" placeholder="输入昵称" maxlength="10">
    <button onclick="saveName()">开始闯关</button>
  </div>
</div>

<!-- HOME -->
<div class="app hidden" id="app">
  <div class="header">
    <h2 id="welcomeTitle">你好！👋</h2>
    <p class="subtitle" id="today">今日</p>
  </div>
  <div class="player-bar">
    <div class="name" id="playerNameDisplay">玩家</div>
    <div class="edit" onclick="showNameModal()">修改昵称</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="num" id="s-current">1</div><div class="label">当前轮次</div></div>
    <div class="stat-card"><div class="num" id="s-completed">0</div><div class="label">已通过</div></div>
    <div class="stat-card"><div class="num" id="s-rate">0%</div><div class="label">本周正确率</div></div>
  </div>
  <div id="mainTask"></div>
  <div id="duelEntry"></div>
  <button class="leaderboard-btn" onclick="showLeaderboard()">🏆 查看排行榜</button>
  <button class="review-btn" onclick="showReview()">📚 复习已解锁轮次</button>
  <div class="history-section" id="hSec">
    <h3>📖 闯关记录</h3>
    <div id="hList"></div>
  </div>
  <button class="review-btn" onclick="exportData()">📥 导出本地备份</button>
</div>

<!-- GAME SCREEN (shared for main & duel) -->
<div class="game-screen hidden" id="game">
  <div class="game-header">
    <div class="back" onclick="quitGame()">←</div>
    <div class="game-progress"><div class="progress-track"><div class="progress-fill" id="pg" style="width:0%"></div></div></div>
    <div class="game-stats"><div class="c">✓ <span id="gOk">0</span></div><div class="w">✗ <span id="gBad">0</span></div></div>
  </div>
  <div class="card-area">
    <div class="timer" id="timer">10</div>
    <div class="word-card">
      <div class="retest-tag hidden" id="rtag">错题重练</div>
      <div class="duel-tag hidden" id="dtag">大乱斗</div>
      <button class="speak-btn" id="spk" onclick="speakNow()" title="播放发音">🔊</button>
      <div class="word-display" id="wd">word</div>
      <div class="phonetic" id="ph">loading...</div>
    </div>
    <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 需要提示？</button>
    <div class="hint-box hidden" id="hintBox">
      <div id="hintPos" style="color:var(--t2);margin-bottom:6px"></div>
      <div id="hintEx" style="color:var(--t);line-height:1.6"></div>
    </div>
    <div class="result-strip hidden" id="rstrip"></div>
    <div class="options" id="opts"></div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="result-screen hidden" id="result">
  <div class="result-emoji" id="re">🎉</div>
  <div class="result-title" id="rt">闯关完成！</div>
  <div class="result-subtitle" id="rs">继续加油</div>
  <div class="scorecard">
    <div class="big-score" id="bs">80%</div>
    <div class="score-label">正确率</div>
    <div class="bd">
      <div class="bd-it g"><div class="bd-n" id="bOk">8</div><div class="bd-l">答对</div></div>
      <div class="bd-it r"><div class="bd-n" id="bBad">2</div><div class="bd-l">答错</div></div>
      <div class="bd-it"><div class="bd-n" id="bAvg">3.2s</div><div class="bd-l">平均用时</div></div>
    </div>
  </div>
  <div class="review-list">
    <h3>📝 本次回顾</h3>
    <div id="rv"></div>
  </div>
  <div class="act-btns">
    <button class="btn btn-sec" onclick="goHome()">回到首页</button>
    <button class="btn btn-prim" id="nxtBtn" onclick="nextAction()">再来一次</button>
  </div>
</div>

<!-- DUEL RESULT SCREEN -->
<div class="result-screen hidden" id="duelResult">
  <div class="result-emoji" id="dre">🏆</div>
  <div class="result-title" id="drt">大乱斗完成！</div>
  <div class="result-subtitle" id="drs">挑战排行榜</div>
  <div class="scorecard">
    <div class="big-score" id="dbs">75%</div>
    <div class="score-label">正确率</div>
    <div class="bd">
      <div class="bd-it g"><div class="bd-n" id="dbOk">24</div><div class="bd-l">答对</div></div>
      <div class="bd-it r"><div class="bd-n" id="dbBad">6</div><div class="bd-l">答错</div></div>
      <div class="bd-it"><div class="bd-n" id="dbTime">45s</div><div class="bd-l">总用时</div></div>
    </div>
  </div>
  <div class="act-btns">
    <button class="btn btn-sec" onclick="goHome()">回到首页</button>
    <button class="btn btn-prim" onclick="showLeaderboard()">查看排行榜</button>
  </div>
</div>

<!-- LEADERBOARD SCREEN -->
<div class="lb-screen hidden" id="lbScreen">
  <div class="lb-header"><div class="back" onclick="goHome()">←</div><h2>🏆 大乱斗排行榜</h2></div>
  <div id="lbLoading" style="text-align:center;color:var(--t2);padding:20px">加载中...</div>
  <div class="lb-table hidden" id="lbTable"></div>
  <div style="text-align:center;margin-top:20px"><button class="btn btn-sec" onclick="goHome()">回到首页</button></div>
</div>

<!-- REVIEW SCREEN -->
<div class="review-screen hidden" id="reviewScreen">
  <div class="lb-header"><div class="back" onclick="goHome()">←</div><h2>📚 选择复习轮次</h2></div>
  <div id="reviewList"></div>
</div>

  if(phoneticCache[word])return phoneticCache[word];
  try{
    var res=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    if(!res.ok)throw new Error('API error');
    var data=await res.json();
    var ph='';
    if(data&&data[0]){
      ph=data[0].phonetic||'';
      if(!ph&&data[0].phonetics){var p=data[0].phonetics.find(function(x){return x.text});if(p)ph=p.text}
    }
    phoneticCache[word]=ph||'';saveProgress();return ph;
  }catch(e){return ''}
}

// ====== NAME ======
function enter(){
  loadStorage();
  if(!playerName){document.getElementById('nameModal').classList.remove('hidden');return}
  document.getElementById('splash').classList.add('gone');
  setTimeout(function(){document.getElementById('splash').style.display='none';document.getElementById('app').classList.remove('hidden');init()},600);
}
function saveName(){
  var n=document.getElementById('nameInput').value.trim();
  if(!n){alert('请输入昵称');return}
  playerName=n;saveProgress();
  document.getElementById('nameModal').classList.add('hidden');
  document.getElementById('splash').classList.add('gone');
  setTimeout(function(){document.getElementById('splash').style.display='none';document.getElementById('app').classList.remove('hidden');init()},600);
}
function showNameModal(){
  document.getElementById('nameInput').value=playerName;
  document.getElementById('nameModal').classList.remove('hidden');
}

// ====== HOME ======
function init(){
  document.getElementById('welcomeTitle').textContent='你好，'+playerName+'！👋';
  document.getElementById('playerNameDisplay').textContent=playerName;
  document.getElementById('today').textContent=fmtDate(new Date());
  document.getElementById('s-current').textContent=currentRound;
  document.getElementById('s-completed').textContent=completedRounds.length;
  document.getElementById('s-rate').textContent=calcRate()+'%';
  renderMainTask();renderDuelEntry();renderHistory();
}

function renderMainTask(){
  var c=document.getElementById('mainTask');c.innerHTML='';
  var d=document.createElement('div');d.className='task-card';
  var isLocked=completedRounds.length+1<currentRound;
  var badge=isLocked?'🔒 需先通过上一轮':'新挑战';
  var btnText=isLocked?'请先完成轮次'+(currentRound-1)+' →':'开始闯关';
  d.innerHTML='<div class="task-header"><div class="task-title">📖 第'+currentRound+'轮 · 主线闯关</div><div class="task-badge">'+badge+'</div></div><div class="task-meta">共 '+getRoundWords(currentRound).length+' 个单词 · 正确率≥'+PASS_RATE+'%解锁下一轮</div><button class="task-btn" '+(isLocked?'disabled':'')+' onclick="startMainRound('+currentRound+')">'+btnText+'</button>';
  c.appendChild(d);
}

function renderDuelEntry(){
  var c=document.getElementById('duelEntry');c.innerHTML='';
  var unlocked=completedRounds.length>=DUEL_UNLOCK;
  var d=document.createElement('div');
  d.className='duel-card'+(unlocked?'':' locked');
  if(unlocked){
    d.onclick=function(){startDuel()};
    d.innerHTML='<h3>⚔️ 单词大乱斗</h3><p>从已解锁的 '+completedRounds.length*ROUND_SIZE+' 个单词中随机挑战30题 · 无提示 · 纯速度</p>';
  }else{
    d.innerHTML='<div class="lock-icon">🔒</div><h3>单词大乱斗</h3><p>还需完成 '+(DUEL_UNLOCK-completedRounds.length)+' 轮即可解锁（当前 '+completedRounds.length+'/'+DUEL_UNLOCK+'）</p>';
  }
  c.appendChild(d);
}

function renderHistory(){
  var keys=Object.keys(roundStats).sort(function(a,b){return parseInt(b)-parseInt(a)});
  if(!keys.length){document.getElementById('hSec').style.display='none';return}
  document.getElementById('hSec').style.display='block';
  var c=document.getElementById('hList');c.innerHTML='';
  keys.slice(0,5).forEach(function(k){
    var stats=roundStats[k];
    if(!stats||!stats.length)return;
    var last=stats[stats.length-1];
    var sc=last.acc>=90?'g':last.acc>=60?'y':'r';
    var ic=last.acc>=90?'🏆':last.acc>=60?'👍':'💪';
    var d=document.createElement('div');d.className='history-item';
    d.innerHTML='<div class="history-icon '+sc+'">'+ic+'</div><div class="history-info"><div class="history-title">第'+k+'轮 · 尝试'+stats.length+'次</div><div class="history-date">最近: '+last.acc+'% 正确率 · '+last.date+'</div></div><div class="history-score '+sc+'">'+last.acc+'%';
    c.appendChild(d);
  });
}

function getRoundWords(rn){
  var start=(rn-1)*ROUND_SIZE;
  var end=Math.min(start+ROUND_SIZE,BANK.length);
  return BANK.slice(start,end);
}

// ====== MAIN ROUND ======
function startMainRound(rn){
  G.mode='main';G.roundNum=rn;G.i=0;G.ok=0;G.bad=0;G.res=[];G.wrongSet=new Set();G.usedHint=false;
  var words=getRoundWords(rn).slice().sort(function(){return Math.random()-.5});
  G.seq=words;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('rtag').classList.add('hidden');
  document.getElementById('dtag').classList.add('hidden');
  document.getElementById('hintBtn').classList.remove('hidden');
  renderQ();
}

// ====== DUEL ======
function startDuel(){
  if(completedRounds.length<DUEL_UNLOCK){alert('请先完成'+DUEL_UNLOCK+'轮主线闯关');return}
  G.mode='duel';G.i=0;G.ok=0;G.bad=0;G.res=[];G.wrongSet=new Set();G.usedHint=false;
  var pool=[];
  completedRounds.forEach(function(rn){pool=pool.concat(getRoundWords(rn))});
  G.seq=pool.slice().sort(function(){return Math.random()-.5}).slice(0,DUEL_SIZE);
  G.startTime=Date.now();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('rtag').classList.add('hidden');
  document.getElementById('dtag').classList.remove('hidden');
  document.getElementById('hintBtn').classList.add('hidden');
  renderQ();
}

// ====== GAME RENDER ======
function renderQ(){
  if(G.i>=G.seq.length){finish();return}
  var q=G.seq[G.i];
  G.usedHint=false;
  document.getElementById('htag')&&document.getElementById('htag').classList.add('hidden');
  document.getElementById('hintBtn').disabled=false;
  document.getElementById('hintBox').classList.add('hidden');
  document.getElementById('rstrip').classList.add('hidden');
  document.getElementById('gOk').textContent=G.ok;
  document.getElementById('gBad').textContent=G.bad;
  document.getElementById('wd').textContent=q.w;
  document.getElementById('ph').textContent='loading...';
  var total=G.mode==='main'?G.seq.length:DUEL_SIZE;
  document.getElementById('pg').style.width=(G.i/total*100)+'%';
  var opts=genOpts(q);renderOpts(opts,q);
  document.getElementById('timer').textContent=TIME_LIMIT;
  document.getElementById('timer').className='timer';
  startT();
  fetchPhonetic(q.w).then(function(ph){var el=document.getElementById('ph');if(ph){el.textContent=ph;el.style.color='var(--p)'}else{el.textContent='暂无音标';el.style.color='var(--t2)'}});
  setTimeout(function(){speak(q.w)},400);
}

function genOpts(correct){
  var wrong=BANK.filter(function(x){return x.w!==correct.w}).slice().sort(function(){return Math.random()-.5}).slice(0,5);
  var all=[correct].concat(wrong).slice().sort(function(){return Math.random()-.5});
  return all.map(function(o){return{w:o.w,m:o.m,ok:o.w===correct.w}});
}
function renderOpts(opts,correct){
  var c=document.getElementById('opts');c.innerHTML='';
  opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt-btn';b.textContent=String.fromCharCode(65+idx)+'. '+o.m;b.dataset.ok=o.ok?'true':'false';
    b.onclick=function(){pick(o.ok,b)};c.appendChild(b);
  });
}

var tmr=null,tLeft=TIME_LIMIT;
function startT(){clearInterval(tmr);tLeft=TIME_LIMIT;tmr=setInterval(function(){tLeft-=.1;var el=document.getElementById('timer');el.textContent=Math.max(0,Math.ceil(tLeft));if(tLeft<=3)el.className='timer urgent';if(tLeft<=0){clearInterval(tmr);timeout()}},100)}
function timeout(){document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled')});showAns(false,null,true)}

function showHint(){
  if(G.mode==='duel')return;
  clearInterval(tmr);G.usedHint=true;
  document.getElementById('hintBtn').disabled=true;
  var q=G.seq[G.i];
  document.getElementById('hintPos').textContent='词性：'+q.p;
  document.getElementById('hintEx').innerHTML=q.e.replace(new RegExp(q.w,'gi'),'<b>'+q.w+'</b>');
  document.getElementById('hintBox').classList.remove('hidden');
}

function pick(isCorrect,btn){
  clearInterval(tmr);
  document.querySelectorAll('.opt-btn').forEach(function(b){b.classList.add('disabled');if(b.dataset.ok==='true')b.classList.add('correct')});
  if(!isCorrect)btn.classList.add('wrong');
  showAns(isCorrect,btn,false);
}

function showAns(ok,btn,wasTimeout){
  var q=G.seq[G.i];
  var t=(TIME_LIMIT-Math.max(0,tLeft)).toFixed(1);
  G.res.push({w:q.w,ok:ok,time:parseFloat(t),hint:G.usedHint||false});
  if(ok){G.ok++;document.getElementById('rstrip').textContent='✅ 正确！';document.getElementById('rstrip').className='result-strip ok'}
  else{G.bad++;if(wasTimeout){document.getElementById('rstrip').textContent='⏰ 时间到！'}else{document.getElementById('rstrip').textContent='❌ 再想想看'}document.getElementById('rstrip').className='result-strip bad'}
  document.getElementById('rstrip').classList.remove('hidden');
  setTimeout(nextQ,1800);
}
function nextQ(){G.i++;renderQ()}

function speak(w){if(!w)return;if(currentAudio){currentAudio.pause();currentAudio=null}if('speechSynthesis' in window){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.85;u.pitch=1;var voices=window.speechSynthesis.getVoices();var enVoice=voices.find(function(v){return v.lang&&v.lang.startsWith('en')});if(enVoice)u.voice=enVoice;window.speechSynthesis.speak(u);setTimeout(function(){tryYoudao(w)},800);return}tryYoudao(w)}
function tryYoudao(w){var url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w)+'&type=2';var audio=new Audio(url);currentAudio=audio;audio.play().catch(function(){})}
function speakNow(){var w=G.seq[G.i]?G.seq[G.i].w:null;if(w)speak(w)}

function quitGame(){if(confirm('确定退出？当前进度不会保存。')){clearInterval(tmr);if(currentAudio)currentAudio.pause();document.getElementById('game').classList.add('hidden');goHome()}}

// ====== FINISH ======
function finish(){
  var total=G.seq.length;
  var acc=total>0?Math.round(G.ok/total*100):0;
  var times=G.res.map(function(r){return r.time});
  var avg=times.length?(times.reduce(function(a,b){return a+b},0)/times.length).toFixed(1):'0.0';

  if(G.mode==='main'){
    var rec={acc:acc,ok:G.ok,bad:G.bad,avg:avg,date:fmtDate(new Date()),total:total,res:G.res};
    if(!roundStats[G.roundNum])roundStats[G.roundNum]=[];
    roundStats[G.roundNum].push(rec);
    if(acc>=PASS_RATE&&completedRounds.indexOf(G.roundNum)===-1){
      completedRounds.push(G.roundNum);
      if(G.roundNum===currentRound&&currentRound<TOTAL_ROUNDS)currentRound++;
    }
    saveProgress();
    autoUploadMain(rec);
    document.getElementById('game').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('bs').textContent=acc+'%';
    document.getElementById('bOk').textContent=G.ok;
    document.getElementById('bBad').textContent=G.bad;
    document.getElementById('bAvg').textContent=avg+'s';
    var em,tit,sub,btnText;
    if(acc>=PASS_RATE){em='🏆';tit='闯关成功！';sub='正确率 '+acc+'% · 解锁下一轮！';btnText='下一轮 →'}
    else{em='💪';tit='继续加油！';sub='正确率 '+acc+'% · 再来一次巩固一下';btnText='再来一次'}
    if(acc>=95){em='🌟';tit='太棒了！';sub='几乎全对！'}
    document.getElementById('re').textContent=em;document.getElementById('rt').textContent=tit;document.getElementById('rs').textContent=sub;
    document.getElementById('nxtBtn').textContent=btnText;
    var rv=document.getElementById('rv');rv.innerHTML='';
    G.res.forEach(function(r){
      var w=BANK.find(function(x){return x.w===r.w});
      var d=document.createElement('div');d.className='rw';
      var tg=r.ok?'<span class="rw-tg m">✓</span>':'<span class="rw-tg s">✗</span>';
      d.innerHTML='<div class="rw-ic">'+(r.ok?'✅':'❌')+'</div><div class="rw-inf"><div class="rw-w">'+r.w+' <span style="color:var(--t2);font-size:12px">'+(w?w.p:'')+'</span></div><div class="rw-m">'+(w?w.m:'')+'</div></div>'+tg;
      rv.appendChild(d);
    });
  }else{
    var totalTime=Math.round((Date.now()-G.startTime)/1000);
    duelStats.attempts++;if(acc>duelStats.bestAcc)duelStats.bestAcc=acc;
    saveProgress();
    autoUploadDuel({acc:acc,ok:G.ok,bad:G.bad,totalTime:totalTime,res:G.res});
    document.getElementById('game').classList.add('hidden');
    document.getElementById('duelResult').classList.remove('hidden');
    document.getElementById('dbs').textContent=acc+'%';
    document.getElementById('dbOk').textContent=G.ok;
    document.getElementById('dbBad').textContent=G.bad;
    document.getElementById('dbTime').textContent=totalTime+'s';
    var dem=acc>80?'🏆':'💪',dtit=acc>80?'上榜成功！':'继续加油',dsub=acc>80?'正确率'+acc+'% · 已进入排行榜':'正确率'+acc+'% · 还需努力';
    if(acc<=80){dtit='还需努力';dsub='正确率'+acc+'% · 超过80%才能上榜'}
    document.getElementById('dre').textContent=dem;document.getElementById('drt').textContent=dtit;document.getElementById('drs').textContent=dsub;
  }
}

function nextAction(){
  var lastAcc=G.mode==='main'&&roundStats[G.roundNum]?roundStats[G.roundNum][roundStats[G.roundNum].length-1].acc:0;
  if(G.mode==='main'&&lastAcc>=PASS_RATE&&G.roundNum<TOTAL_ROUNDS){
    startMainRound(currentRound);
  }else if(G.mode==='main'){
    startMainRound(G.roundNum);
  }
}

function goHome(){
  document.getElementById('game').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('duelResult').classList.add('hidden');
  document.getElementById('lbScreen').classList.add('hidden');
  document.getElementById('reviewScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  init();
}

// ====== AUTO UPLOAD ======
async function autoUploadMain(rec){
  if(!API_BASE)return;
  try{
    var payload={student:playerName||'萱萱',roundId:'round_'+G.roundNum+'_'+Date.now(),timestamp:new Date().toISOString(),device:navigator.userAgent.slice(0,100),total:rec.total,ok:rec.ok,bad:rec.bad,acc:rec.acc,avg:rec.avg,roundNum:G.roundNum,mode:'main',details:rec.res};
    await fetch(API_BASE+'/api/record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch(e){console.log('upload failed',e.message)}
}
async function autoUploadDuel(rec){
  if(!API_BASE)return;
  try{
    var payload={player:playerName||'萱萱',acc:rec.acc,totalTime:rec.totalTime,date:new Date().toISOString(),device:navigator.userAgent.slice(0,100),details:{ok:rec.ok,bad:rec.bad,res:rec.res}};
    await fetch(API_BASE+'/api/duel_record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  }catch(e){console.log('duel upload failed',e.message)}
}

// ====== LEADERBOARD ======
async function showLeaderboard(){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('lbScreen').classList.remove('hidden');
  document.getElementById('lbLoading').classList.remove('hidden');
  document.getElementById('lbTable').classList.add('hidden');
  try{
    var res=await fetch(API_BASE+'/api/leaderboard');
    var data=await res.json();
    document.getElementById('lbLoading').classList.add('hidden');
    var c=document.getElementById('lbTable');c.classList.remove('hidden');c.innerHTML='';
    if(!data.entries||!data.entries.length){c.innerHTML='<div style="padding:20px;text-align:center;color:var(--t2)">暂无记录，快来挑战吧！</div>';return}
    data.entries.forEach(function(e,idx){
      var d=document.createElement('div');d.className='lb-row';
      var rk=idx+1;var rkClass=rk<=3?'top':'';
      var rkIcon=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':'#'+rk;
      d.innerHTML='<div class="lb-rank '+rkClass+'">'+rkIcon+'</div><div class="lb-name">'+e.player+'</div><div class="lb-acc">'+e.acc+'%</div><div class="lb-time">'+e.totalTime+'s</div>';
      c.appendChild(d);
    });
  }catch(e){
    document.getElementById('lbLoading').textContent='加载失败，请检查网络';
  }
}

// ====== REVIEW ======
function showReview(){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('reviewScreen').classList.remove('hidden');
  var c=document.getElementById('reviewList');c.innerHTML='';
  var available=[];
  for(var i=1;i<=Math.max(currentRound,Math.max.apply(null,completedRounds.concat([0])));i++){
    available.push(i);
  }
  if(!available.length){c.innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)">暂无已解锁轮次</div>';return}
  available.forEach(function(rn){
    var d=document.createElement('div');d.className='review-card';
    var isDone=completedRounds.indexOf(rn)!==-1;
    var badge=isDone?'<span class="r-badge done">已通过</span>':'<span class="r-badge retry">需巩固</span>';
    var stats=roundStats[rn];var last=stats&&stats.length?stats[stats.length-1]:null;
    var meta=last?'最近 '+last.acc+'% · 尝试'+stats.length+'次':'尚未挑战';
    d.innerHTML='<div class="r-title">第'+rn+'轮</div>'+badge+'<div class="r-meta">'+meta+' · '+getRoundWords(rn).length+'个单词</div>';
    d.onclick=function(){startMainRound(rn)};
    c.appendChild(d);
  });
}

// ====== EXPORT ======
function exportData(){
  var data={exportTime:new Date().toISOString(),player:playerName,version:'v6',progress:{currentRound:currentRound,completedRounds:completedRounds,roundStats:roundStats,duelStats:duelStats},bankSize:BANK.length};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='萱萱单词_'+playerName+'_'+fmtDate(new Date())+'.json';
  a.click();URL.revokeObjectURL(url);
}

// ====== UTILS ======
function fmtDate(d){return (d.getMonth()+1)+'月'+d.getDate()+'日'}
function calcRate(){
  var totalOk=0,totalAll=0;
  Object.values(roundStats).forEach(function(stats){if(stats&&stats.length){var last=stats[stats.length-1];totalOk+=last.ok||0;totalAll+=last.total||0}});
  return totalAll?Math.round(totalOk/totalAll*100):0;
}
